<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoSpot — כניסה 🔒</title>
  <!-- העיצוב כאן מוטמע (inline) כדי שעמוד הכניסה יעבוד גם לפני שעברת את השער -->
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, "Segoe UI", Arial, sans-serif;
      background: #2d7ef7;
      color: #1f2933;
      padding: 16px;
    }
    .box {
      background: #fff;
      border-radius: 12px;
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      text-align: center;
    }
    h1 { margin: 0 0 4px; font-size: 1.6rem; }
    p.sub { margin: 0 0 20px; color: #6b7280; font-size: 0.95rem; }
    input {
      width: 100%;
      padding: 12px;
      font-size: 1.1rem;
      text-align: center;
      letter-spacing: 2px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #2d7ef7;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #1c5fc4; }
    .error {
      color: #dc2626;
      font-weight: 600;
      margin-bottom: 12px;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>📍 PhotoSpot</h1>
    <p class="sub">האתר מוגן. יש להזין קוד גישה כדי להיכנס.</p>

    <!-- אם הייתה שגיאה, מציגים אותה -->
    {% if error %}
      <div class="error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <input
        type="password"
        name="code"
        placeholder="קוד גישה"
        autofocus
        required
      >
      <button type="submit">🔓 כניסה</button>
    </form>
  </div>
</body>
</html>
